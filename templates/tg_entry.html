{% extends "base.html" %}
{% block scripts_pre %}<script src="https://telegram.org/js/telegram-web-app.js"></script>{% endblock %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="panel" style="max-width:480px;margin:40px auto;text-align:center;">
      <img src="/static/img/logo.png" alt="Няня на час"
           style="width:72px;height:72px;border-radius:50%;margin-bottom:14px;">
      <h3 style="margin:0 0 6px">Авторизация</h3>
      <div id="tgStatus" class="muted" style="font-size:15px;">Проверяем Telegram…</div>
      <!-- Manual buttons shown after auth -->
      <div id="tgButtons" style="display:none;margin-top:20px;flex-direction:column;gap:10px;"></div>
    </div>
  </div>
</section>

<script>
(function () {
  var statusEl  = document.getElementById('tgStatus');
  var buttonsEl = document.getElementById('tgButtons');

  function setStatus(txt, color) {
    statusEl.textContent = txt;
    statusEl.style.color = color || '';
  }
  function addButton(label, href, primary) {
    buttonsEl.style.display = 'flex';
    var a = document.createElement('a');
    a.href = href;
    a.textContent = label;
    a.className = 'btn ' + (primary ? 'primary' : 'secondary');
    a.style.textDecoration = 'none';
    a.style.textAlign = 'center';
    buttonsEl.appendChild(a);
  }

  function doAuth(initData) {
    setStatus('Авторизуемся…');
    fetch('/api/auth/telegram', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData }),
      credentials: 'include',
    })
      .then(function (r) {
        return r.json().then(function (d) { return { ok: r.ok, data: d }; });
      })
      .then(function (res) {
        if (!res.ok) {
          setStatus('Ошибка авторизации. Попробуйте ещё раз.', '#e74c3c');
          addButton('Открыть главную', '/', false);
          return;
        }

        var role      = res.data.role || 'client';
        var authToken = res.data.auth_token || '';
        var lkUrl     = res.data.lk_url || '';
        var portals   = Array.isArray(res.data.available_portals) ? res.data.available_portals : [];
        var dest;

        if (portals.length > 1) {
          buttonsEl.innerHTML = '';
          setStatus('Выберите кабинет');
          portals.forEach(function (portal, idx) {
            if (!portal || !portal.url) return;
            addButton(portal.label || 'Открыть кабинет', portal.url, idx === 0);
          });
          return;
        }

        if (role === 'admin') {
          dest = '/admin';
          if (authToken) dest += '?_t=' + encodeURIComponent(authToken);
        } else if (role === 'nanny') {
          dest = '/nanny/app';
          if (authToken) dest += '?_t=' + encodeURIComponent(authToken);
        } else if (role === 'agent') {
          dest = '/agent/app';
          if (authToken) dest += '?_t=' + encodeURIComponent(authToken);
        } else {
          dest = lkUrl || '/';
        }

        setStatus('Готово! Перехожу…');
        addButton('Перейти →', dest, true);
        setTimeout(function () { window.location.href = dest; }, 600);
      })
      .catch(function () {
        setStatus('Сетевая ошибка. Попробуйте позже.', '#e74c3c');
        addButton('Открыть главную', '/', false);
      });
  }

  // Wait for Telegram SDK
  var tries = 0;
  var timer = setInterval(function () {
    tries++;
    if (window.Telegram && window.Telegram.WebApp) {
      clearInterval(timer);
      var tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      var initData = tg.initData || '';
      if (!initData) {
        setStatus('Откройте через кнопку в @Nannynhatrang_bot', '#e67e22');
        addButton('Открыть главную', '/', false);
        return;
      }
      doAuth(initData);
    } else if (tries > 50) {
      clearInterval(timer);
      setStatus('Не внутри Telegram', '#e67e22');
      addButton('Открыть главную', '/', false);
      setTimeout(function () { window.location.href = '/'; }, 2000);
    }
  }, 100);
})();
</script>
{% endblock %}
