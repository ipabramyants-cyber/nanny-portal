{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="panel" style="max-width:480px;margin:40px auto;text-align:center;">
      <img src="/static/img/logo.png" alt="Няня на час" style="width:72px;height:72px;border-radius:50%;margin-bottom:14px;">
      <h3 style="margin:0 0 6px">Входим…</h3>
      <div id="tgStatus" class="muted">Проверяем Telegram‑аккаунт</div>
      <div id="tgDebug" style="margin-top:12px;font-size:13px;opacity:.7;display:none;white-space:pre-wrap;text-align:left;"></div>
    </div>
  </div>
</section>

<script>
(function(){
  var status  = document.getElementById('tgStatus');
  var debugEl = document.getElementById('tgDebug');

  function setStatus(text, color) {
    status.textContent = text;
    status.style.color = color || '';
  }
  function showDebug(text) {
    debugEl.style.display = 'block';
    debugEl.textContent = text;
  }

  function doAuth(initData) {
    setStatus('Авторизуемся…');
    fetch('/api/auth/telegram', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({init_data: initData}),
      credentials: 'include'
    })
    .then(function(r){ return r.json().then(function(d){ return {ok: r.ok, data: d}; }); })
    .then(function(res){
      if (!res.ok) {
        setStatus('Ошибка авторизации: ' + (res.data.error || '?'), '#e74c3c');
        showDebug('Убедитесь что TELEGRAM_BOT_TOKEN добавлен в переменные Railway.\nError: ' + JSON.stringify(res.data));
        return;
      }
      var role = res.data.role || 'client';
      window.__TG_AUTH__ = Object.assign({ok: true}, res.data);

      // Авторедирект по роли
      if (role === 'admin') {
        setStatus('Добро пожаловать, администратор! Открываю панель…');
        window.location.href = '/admin';
      } else if (role === 'nanny') {
        setStatus('Добро пожаловать, няня! Открываю кабинет…');
        window.location.href = '/nanny/app';
      } else {
        setStatus('Добро пожаловать! Открываю личный кабинет…');
        window.location.href = '/client/app';
      }
    })
    .catch(function(e){
      setStatus('Ошибка сети', '#e74c3c');
      showDebug(e.message);
    });
  }

  // Ждём загрузки Telegram SDK
  var tries = 0;
  var timer = setInterval(function(){
    tries++;
    if (window.Telegram && window.Telegram.WebApp) {
      clearInterval(timer);
      var tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      var initData = tg.initData || '';
      if (!initData) {
        setStatus('initData пустой — откройте через кнопку в боте', '#e67e22');
        showDebug('Telegram ID узнайте у @userinfobot\nЕсли вы открываете в браузере — зайдите напрямую:\n/admin?dev_token=YOUR_ADMIN_TOKEN');
        return;
      }
      doAuth(initData);
    } else if (tries > 40) {
      clearInterval(timer);
      // Не внутри Telegram — редирект на главную
      window.location.href = '/';
    }
  }, 100);
})();
</script>
{% endblock %}
