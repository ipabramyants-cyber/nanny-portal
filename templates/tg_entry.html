{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="panel" style="max-width:480px;margin:40px auto;text-align:center;">
      <img src="/static/img/logo.png" alt="Няня на час"
           style="width:72px;height:72px;border-radius:50%;margin-bottom:14px;">
      <h3 style="margin:0 0 6px">Авторизация</h3>
      <div id="tgStatus" class="muted" style="font-size:15px;">Проверяем Telegram…</div>

      <!-- Debug block — always visible для диагностики -->
      <div id="tgDebug" style="margin-top:16px;font-size:12px;text-align:left;
                               background:#f4f4f4;padding:12px;border-radius:8px;
                               white-space:pre-wrap;word-break:break-all;display:none;"></div>

      <!-- Manual buttons shown after auth -->
      <div id="tgButtons" style="display:none;margin-top:20px;display:flex;flex-direction:column;gap:10px;"></div>
    </div>
  </div>
</section>

<script>
(function () {
  var statusEl  = document.getElementById('tgStatus');
  var debugEl   = document.getElementById('tgDebug');
  var buttonsEl = document.getElementById('tgButtons');
  var log = [];

  function addLog(msg) {
    log.push(msg);
    debugEl.style.display = 'block';
    debugEl.textContent = log.join('\n');
  }
  function setStatus(txt, color) {
    statusEl.textContent = txt;
    statusEl.style.color = color || '';
  }
  function addButton(label, href, primary) {
    buttonsEl.style.display = 'flex';
    var a = document.createElement('a');
    a.href = href;
    a.textContent = label;
    a.className = 'btn ' + (primary ? 'primary' : 'secondary');
    a.style.textDecoration = 'none';
    a.style.textAlign = 'center';
    buttonsEl.appendChild(a);
  }

  function doAuth(initData) {
    setStatus('Авторизуемся на сервере…');
    addLog('→ POST /api/auth/telegram');
    addLog('initData length: ' + initData.length);

    fetch('/api/auth/telegram', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData }),
      credentials: 'include',
    })
      .then(function (r) {
        addLog('← HTTP ' + r.status);
        return r.json().then(function (d) { return { status: r.status, ok: r.ok, data: d }; });
      })
      .then(function (res) {
        addLog('Response: ' + JSON.stringify(res.data));

        if (!res.ok) {
          setStatus('Ошибка авторизации', '#e74c3c');
          addLog('ERROR: ' + (res.data.error || 'unknown'));
          addLog('\nПроверьте Railway Variables:\n- TELEGRAM_BOT_TOKEN\n- ADMIN_IDS (числовой ID)');
          return;
        }

        var role      = res.data.role || 'client';
        var authToken = res.data.auth_token || '';
        var tgId      = res.data.telegram_user_id || '?';

        addLog('role: ' + role);
        addLog('telegram_user_id: ' + tgId);
        addLog('auth_token: ' + (authToken ? authToken.substring(0,8)+'…' : 'MISSING'));

        var dest = '/client/app';
        if (role === 'admin') dest = '/admin';
        if (role === 'nanny') dest = '/nanny/app';
        if (authToken) dest += '?_t=' + encodeURIComponent(authToken);

        addLog('→ redirect: ' + dest);
        setStatus('Готово! role=' + role + '. Перехожу…');

        // Show manual button in case auto-redirect fails
        addButton('Перейти вручную → ' + dest.split('?')[0], dest, true);

        setTimeout(function () {
          window.location.href = dest;
        }, 800);
      })
      .catch(function (e) {
        setStatus('Сетевая ошибка', '#e74c3c');
        addLog('FETCH ERROR: ' + e.message);
      });
  }

  // Wait for Telegram SDK
  addLog('Waiting for Telegram SDK…');
  var tries = 0;
  var timer = setInterval(function () {
    tries++;
    if (window.Telegram && window.Telegram.WebApp) {
      clearInterval(timer);
      addLog('SDK loaded (tries=' + tries + ')');
      var tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      var initData = tg.initData || '';
      addLog('initData: ' + (initData ? 'present (' + initData.length + ' chars)' : 'EMPTY'));
      if (!initData) {
        setStatus('initData пустой', '#e67e22');
        addLog('Откройте через кнопку Menu Button в @Nannynhatrang_bot');
        addLog('\nВход в браузере:\n' + window.location.origin + '/admin?dev_token=ВАШ_ADMIN_TOKEN');
        addButton('Открыть главную', '/', false);
        return;
      }
      doAuth(initData);
    } else if (tries > 50) {
      clearInterval(timer);
      addLog('Telegram SDK не найден — не внутри Telegram');
      addLog('Редирект на главную через 2 сек…');
      setStatus('Не внутри Telegram', '#e67e22');
      addButton('Открыть главную', '/', false);
      setTimeout(function () { window.location.href = '/'; }, 2000);
    }
  }, 100);
})();
</script>
{% endblock %}
