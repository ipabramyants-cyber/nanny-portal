{% extends "base.html" %}
{% block scripts_pre %}<script src="https://telegram.org/js/telegram-web-app.js"></script>{% endblock %}
{% block title %}Вход{% endblock %}
{% block content %}
<style>
  .tg-entry-stage{min-height:72vh;display:flex;align-items:center;justify-content:center;padding:var(--s8) var(--s4);}
  .tg-entry-card{width:100%;max-width:440px;text-align:center;}
  .tg-entry-loader{position:relative;width:148px;height:148px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
  .tg-entry-loader__ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(1,107,130,.14);animation:tg-auth-ring 1.8s ease-in-out infinite;}
  .tg-entry-loader__ring:nth-child(2){inset:12px;animation-delay:.22s;border-color:rgba(10,181,212,.22);}
  .tg-entry-loader__ring:nth-child(3){inset:24px;animation-delay:.44s;border-color:rgba(46,156,56,.2);}
  .tg-entry-loader img{width:82px;height:82px;border-radius:50%;box-shadow:0 14px 34px rgba(1,107,130,.18);animation:tg-auth-logo 1.4s ease-in-out infinite;}
  .tg-entry-dots{display:flex;gap:6px;justify-content:center;margin-top:12px;}
  .tg-entry-dots span{width:7px;height:7px;border-radius:50%;background:var(--c-teal);opacity:.35;animation:tg-auth-dot 1.1s ease-in-out infinite;}
  .tg-entry-dots span:nth-child(2){animation-delay:.16s;}
  .tg-entry-dots span:nth-child(3){animation-delay:.32s;}
  .tg-entry-choice{display:none;margin-top:20px;flex-direction:column;gap:10px;}
  .tg-entry-message{display:none;font-size:15px;color:var(--c-text-2);margin-top:10px;}
  @keyframes tg-auth-ring{0%,100%{transform:scale(.9);opacity:.5;}50%{transform:scale(1.04);opacity:1;}}
  @keyframes tg-auth-logo{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-4px) scale(1.03);}}
  @keyframes tg-auth-dot{0%,100%{opacity:.25;transform:translateY(0);}50%{opacity:1;transform:translateY(-4px);}}
</style>
<section class="section">
  <div class="container tg-entry-stage">
    <div class="panel tg-entry-card">
      <div id="tgSplash" aria-label="Загрузка">
        <div class="tg-entry-loader">
          <div class="tg-entry-loader__ring"></div>
          <div class="tg-entry-loader__ring"></div>
          <div class="tg-entry-loader__ring"></div>
          <img src="/static/img/logo.webp" alt="Няня на час" width="82" height="82" decoding="async">
        </div>
        <div class="tg-entry-dots"><span></span><span></span><span></span></div>
      </div>
      <div id="tgStatus" class="tg-entry-message"></div>
      <div id="tgButtons" class="tg-entry-choice"></div>
    </div>
  </div>
</section>

<script>
(function () {
  var statusEl  = document.getElementById('tgStatus');
  var buttonsEl = document.getElementById('tgButtons');
  var splashEl  = document.getElementById('tgSplash');

  function setStatus(txt, color) {
    statusEl.textContent = txt;
    statusEl.style.color = color || '';
    statusEl.style.display = txt ? 'block' : 'none';
  }
  function showChoice() {
    if (splashEl) splashEl.style.display = 'none';
    buttonsEl.style.display = 'flex';
  }
  function showError(txt) {
    if (splashEl) splashEl.style.display = 'none';
    setStatus(txt, '#e74c3c');
  }
  function addButton(label, href, primary) {
    showChoice();
    var a = document.createElement('a');
    a.href = href;
    a.textContent = label;
    a.className = 'btn ' + (primary ? 'primary' : 'secondary');
    a.style.textDecoration = 'none';
    a.style.textAlign = 'center';
    buttonsEl.appendChild(a);
  }

  function doAuth(initData) {
    setStatus('');
    fetch('/api/auth/telegram', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData }),
      credentials: 'include',
    })
      .then(function (r) {
        return r.json().then(function (d) { return { ok: r.ok, data: d }; });
      })
      .then(function (res) {
        if (!res.ok) {
          showError('Не удалось открыть кабинет. Попробуйте ещё раз.');
          addButton('Открыть главную', '/', false);
          return;
        }

        var role      = res.data.role || 'client';
        var authToken = res.data.auth_token || '';
        var lkUrl     = res.data.lk_url || '';
        var portals   = Array.isArray(res.data.available_portals) ? res.data.available_portals : [];
        var dest;

        if (portals.length > 1) {
          buttonsEl.innerHTML = '';
          showChoice();
          setStatus('Выберите кабинет');
          portals.forEach(function (portal, idx) {
            if (!portal || !portal.url) return;
            addButton(portal.label || 'Открыть кабинет', portal.url, idx === 0);
          });
          return;
        }

        if (role === 'admin') {
          dest = '/admin';
          if (authToken) dest += '?_t=' + encodeURIComponent(authToken);
        } else if (role === 'nanny') {
          dest = '/nanny/app';
          if (authToken) dest += '?_t=' + encodeURIComponent(authToken);
        } else if (role === 'agent') {
          dest = '/agent/app';
          if (authToken) dest += '?_t=' + encodeURIComponent(authToken);
        } else {
          dest = lkUrl || '/';
        }

        window.location.replace(dest);
      })
      .catch(function () {
        showError('Сетевая ошибка. Попробуйте позже.');
        addButton('Открыть главную', '/', false);
      });
  }

  // Wait for Telegram SDK
  var tries = 0;
  var timer = setInterval(function () {
    tries++;
    if (window.Telegram && window.Telegram.WebApp) {
      clearInterval(timer);
      var tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      var initData = tg.initData || '';
      if (!initData) {
        showError('Откройте через кнопку в Telegram-боте.');
        addButton('Открыть главную', '/', false);
        return;
      }
      doAuth(initData);
    } else if (tries > 50) {
      clearInterval(timer);
      showError('Откройте страницу через Telegram Mini App.');
      addButton('Открыть главную', '/', false);
      setTimeout(function () { window.location.href = '/'; }, 2000);
    }
  }, 100);
})();
</script>
{% endblock %}
